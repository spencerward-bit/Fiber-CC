<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiber Color Map</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
</head>
<body>

<header>
  <h1>Fiber Color Map</h1>

  <label for="fiber-count">Total Fibers</label>
  <select id="fiber-count">
    <option value="12">12ct Cable</option>
    <option value="24">24ct Cable</option>
    <option value="48">48ct Cable</option>
    <option value="96">96ct Cable</option>
    <option value="144">144ct Cable</option>
    <option value="288">288ct Cable</option>
    <option value="432">432ct Cable</option>
    <option value="864">864ct Cable</option>
    <option value="1728">1728ct Cable</option>
    <option value="3456">3456ct Cable</option>
    <option value="6912">6912ct Cable</option>
  </select>

  <label for="tube-size">Tube Size</label>
  <select id="tube-size">
    <option value="12">12ct tubes</option>
    <option value="24">24ct tubes</option>
    <option value="36">36ct tubes</option>
    <option value="144">144ct tubes</option>
    <option value="288">288ct tubes</option>
  </select>
</header>

<div id="quick-jump">
  <label for="jump-tube">Tube</label>
  <input type="number" id="jump-tube" min="1">

  <label for="jump-fiber">Fiber</label>
  <input type="number" id="jump-fiber" min="1">

  <button id="jump-btn">Jump</button>
</div>

<div id="total-jump">
  <label for="jump-total">Total Fiber</label>
  <input type="number" id="jump-total" placeholder="Total Fiber #">
  <button id="jump-total-btn">Jump</button>
  <button id="reset-btn" type="button">Reset</button>
</div>

<main id="fiber-map" aria-live="polite"></main>

<div id="info-bar">Tap a fiber</div>

<script src="script.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }
</script>

</body>
</html>
